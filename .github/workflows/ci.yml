name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache de Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Dar permisos a Gradle Wrapper
      run: chmod +x ./gradlew

    - name: Build (sin tests)
      run: ./gradlew build -x test

    - name: Ejecutar tests unitarios
      run: ./gradlew test

    - name: Generar reporte de cobertura (JaCoCo)
      if: always()
      run: ./gradlew jacocoTestReport

    - name: Verificar umbral mínimo de cobertura
      if: always()
      run: ./gradlew jacocoTestCoverageVerification
      continue-on-error: true

    - name: Publicar resultados de tests
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/reports/tests/

    - name: Publicar reporte de cobertura JaCoCo
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage-report
        path: build/reports/jacoco/test/
